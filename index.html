<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    #pdf-viewer { flex: 1; width: 100%; }
    #controls { display: flex; justify-content: center; padding: 5px; background: #eee; }
    #controls button { margin: 0 10px; padding: 10px; font-size: 16px; }
  </style>
</head>
<body>
  <canvas id="pdf-viewer"></canvas>
  <div id="controls">
    <button id="prev">Previous</button>
    <span id="page-info">1 / 1</span>
    <button id="next">Next</button>
  </div>

  <script>
    const url = "./book.pdf"; // PDF ফাইলের path
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.worker.min.js';

    let pdfDoc = null;
    let currentPage = 1;
    let scale = 1.5;

    const canvas = document.getElementById('pdf-viewer');
    const context = canvas.getContext('2d');
    const pageInfo = document.getElementById('page-info');

    function renderPage(pageNum) {
      pdfDoc.getPage(pageNum).then(page => {
        const viewport = page.getViewport({scale: scale});
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        page.render({canvasContext: context, viewport: viewport});
        pageInfo.textContent = `${currentPage} / ${pdfDoc.numPages}`;
      });
    }

    pdfjsLib.getDocument(url).promise.then(doc => {
      pdfDoc = doc;
      renderPage(currentPage);
    });

    document.getElementById('prev').addEventListener('click', () => {
      if(currentPage <= 1) return;
      currentPage--;
      renderPage(currentPage);
    });

    document.getElementById('next').addEventListener('click', () => {
      if(currentPage >= pdfDoc.numPages) return;
      currentPage++;
      renderPage(currentPage);
    });

    // Optional: pinch-zoom or scroll zoom
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      if(e.deltaY < 0) scale += 0.1;
      else scale = Math.max(0.5, scale - 0.1);
      renderPage(currentPage);
    });
  </script>
</body>
</html>
